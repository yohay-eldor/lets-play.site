name: Generate Sitemap

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  sitemap:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4.2.2  # ✅ תוקן: Node.js 24 תואם

    - name: Generate Sitemap
      uses: cicirello/generate-sitemap@v1
      with:
        base-url-path: https://lets-play.site/
        drop-html-extension: true        # ✅ תוקן: שם הפרמטר החדש
        exclude-paths: 404.html,googlec6d425a60261d9bb.html

    - name: Sitemap Generation Report
      run: |
        echo "✅ דפים שנכנסו ל-Sitemap:"
        grep "<loc>" sitemap.xml | sed 's/<loc>//g; s/<\/loc>//g' || echo "לא נמצאו קבצים"
        echo "סה״כ: $(grep -c '<loc>' sitemap.xml || echo 0) דפים"

    - name: Commit and Push Sitemap
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add sitemap.xml
        if git diff --staged --quiet; then
          echo "ℹ️ אין שינויים, אין צורך ב-commit"
        else
          git commit -m "chore: automated sitemap update [skip ci]"
          git push
          echo "✅ sitemap עודכן בהצלחה"
        fi
